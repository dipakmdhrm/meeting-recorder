name: Release Android

# Triggered by pushing an android tag, e.g.:
#   git tag android-1.0.0 && git push origin android-1.0.0
#
# One-time setup required:
#   1. Base64-encode your keystore and add as a repository secret:
#        base64 -w 0 android/meeting-recorder.keystore
#        → Secret name: ANDROID_KEYSTORE_BASE64
#   2. Add two more secrets:
#        ANDROID_KEYSTORE_PASSWORD  (keystore/store password)
#        ANDROID_KEY_PASSWORD       (key password)
#   Key alias is hardcoded as 'meetingrecorder' (not sensitive).

on:
  push:
    tags:
      - 'android-*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK platform + build tools
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" "build-tools;35.0.0"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#android-}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          IFS='.' read -r major minor patch <<< "$VERSION"
          echo "VERSION_CODE=$(( major * 10000 + minor * 100 + patch ))" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/meeting-recorder.keystore

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: meetingrecorder
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             "meeting-recorder-android-${{ steps.version.outputs.VERSION }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Android ${{ steps.version.outputs.VERSION }}"
          files: meeting-recorder-android-*.apk
          generate_release_notes: true
